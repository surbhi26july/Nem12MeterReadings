spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

nem12:
  api-key: test-api-key
  batch-size: 10
  sql-output-directory: ./test-output
  job-timeout-minutes: 5

async:
  core-pool-size: 1
  max-pool-size: 2
  queue-capacity: 5

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
